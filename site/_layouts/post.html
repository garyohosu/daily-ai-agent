---
layout: default
---
<style>
  .post-header { margin-bottom: 2rem; border-bottom: 2px solid #e0e0e0; padding-bottom: 1rem; }
  .post-title { font-size: 1.6rem; font-weight: 800; line-height: 1.3; }
  .post-meta { color: #666; font-size: 0.85rem; margin-top: 0.5rem; }
  .post-content h2 { font-size: 1.15rem; font-weight: 700; margin: 2rem 0 0.5rem; border-left: 4px solid #0070f3; padding-left: 0.6rem; }
  .post-content p { margin: 0.6rem 0 1rem; }
  .post-content ul { margin: 0.5rem 0 1rem 1.5rem; }
  .post-content a { word-break: break-all; }
  .tag { display: inline-block; background: #e8f0fe; color: #1a73e8; font-size: 0.75rem; border-radius: 3px; padding: 2px 7px; margin: 2px; }
  .ad-unit { margin: 2rem 0; text-align: center; background: #f0f0f0; padding: 1rem; border-radius: 4px; font-size: 0.8rem; color: #999; }
  .back-link { margin-top: 2.5rem; font-size: 0.9rem; }
</style>

<article>
  <div class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <div class="post-meta">
      {{ page.date | date: "%Y年%m月%d日" }}
      {% if page.categories %}
        ─
        {% for cat in page.categories %}<span class="tag">{{ cat }}</span>{% endfor %}
      {% endif %}
    </div>
  </div>

  <!-- 記事上部広告 -->
  <div class="ad-unit">
    <ins class="adsbygoogle"
         style="display:block"
         data-ad-client="ca-pub-6743751614716161"
         data-ad-slot="auto"
         data-ad-format="auto"
         data-full-width-responsive="true"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
  </div>

  <div class="post-content">
    {{ content }}
  </div>

  <!-- 記事下部広告 -->
  <div class="ad-unit">
    <ins class="adsbygoogle"
         style="display:block"
         data-ad-client="ca-pub-6743751614716161"
         data-ad-slot="auto"
         data-ad-format="auto"
         data-full-width-responsive="true"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
  </div>

  <div class="back-link"><a href="{{ '/' | relative_url }}">← 記事一覧へ戻る</a></div>
</article>
